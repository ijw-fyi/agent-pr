name: PR Review

on:
  workflow_call:
    inputs:
      model:
        description: 'OpenRouter model identifier'
        type: string
        required: false
      budget:
        description: 'Cost budget in USD'
        type: string
        required: false
      max_loc:
        description: 'Max diff lines of code to review'
        type: string
        required: false
      mcp_config:
        description: 'JSON config for MCP servers'
        type: string
        required: false
    secrets:
      OPENROUTER_KEY:
        required: true
      GEMINI_API_KEY:
        required: false

jobs:
  review:
    # Only run on PR comments that start with /review
    if: github.event.issue.pull_request && startsWith(github.event.comment.body, '/review')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('base_sha', pr.data.base.sha);
            return pr.data;

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Run PR Review Agent
        uses: ijw-fyi/agent-pr@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODEL: ${{ inputs.model || vars.PR_REVIEW_MODEL || 'anthropic/claude-opus-4.6' }}
          MCP_CONFIG: ${{ inputs.mcp_config || vars.MCP_CONFIG || '{"servers":[{"name":"deepwiki","transport":"http","url":"https://mcp.deepwiki.com/mcp"}]}' }}
          PR_AGENT_MAX_LOC: ${{ inputs.max_loc || vars.PR_AGENT_MAX_LOC || '2000' }}
          AGENT_PR_BUDGET: ${{ inputs.budget || vars.AGENT_PR_BUDGET || '2' }}
          ACTION_MODE: review
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          TRIGGER_COMMENT_ID: ${{ github.event.comment.id }}

  pr_comment_reply:
    # Run when someone replies to a review comment (not the initial /review command)
    if: github.event_name == 'pull_request_review_comment' && github.event.action == 'created'
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Needed to create/update __agent_pr__ branch
      pull-requests: write  # Needed to leave notification comment

    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            core.setOutput('head_sha', pr.data.head.sha);
            return pr.data;

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Run Comment Reply Agent
        uses: ijw-fyi/agent-pr@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODEL: ${{ inputs.model || vars.PR_REVIEW_MODEL || 'anthropic/claude-opus-4.6' }}
          MCP_CONFIG: ${{ inputs.mcp_config || vars.MCP_CONFIG || '{"servers":[{"name":"deepwiki","transport":"http","url":"https://mcp.deepwiki.com/mcp"}]}' }}
          AGENT_PR_BUDGET: ${{ inputs.budget || vars.AGENT_PR_BUDGET || '2' }}
          ACTION_MODE: comment-reply
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          COMMENT_ID: ${{ github.event.comment.id }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
